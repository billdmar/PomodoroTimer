name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      # Fails the job on rule errors; warnings surface as a quality signal but
      # do not block. Length/structure thresholds live in .swiftlint.yml.
      - name: Lint
        run: swiftlint lint --reporter github-actions-logging

  build-and-test:
    name: Build & Test (iOS Simulator)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      # Cache resolved SPM artifacts (Firebase pulls large binary targets like
      # grpc.zip from Google's CDN, which intermittently drops the connection).
      # Caching makes resolution fast and resilient to those transient failures.
      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            .build/DerivedData/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # Retry resolution: the CDN download for binary targets occasionally fails
      # with "network connection lost"; a couple of retries clears it.
      - name: Resolve Swift packages
        run: |
          for attempt in 1 2 3; do
            xcodebuild -resolvePackageDependencies \
              -project pomadoro2.xcodeproj -scheme pomadoro2 \
              -derivedDataPath .build/DerivedData && break
            echo "Package resolution attempt $attempt failed; retrying…"
            sleep 10
          done

      # Builds the app and runs the unit-test target. UI tests live in the repo
      # for local use (Xcode ⌘U) but are excluded from CI: headless simulators
      # flakily fail to acquire UI background assertions, which is an
      # environment issue rather than an app defect. The unit suite gates CI.
      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project pomadoro2.xcodeproj \
            -scheme pomadoro2 \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16 Pro' \
            -derivedDataPath .build/DerivedData \
            -only-testing:pomadoro2Tests \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO

      # Enforces a line-coverage floor on the pure-logic files only (see the
      # script header for why view code is excluded).
      - name: Coverage gate (logic files)
        run: |
          xcresult="$(ls -dt .build/DerivedData/Logs/Test/*.xcresult | head -1)"
          bash scripts/check-coverage.sh "$xcresult" 80
