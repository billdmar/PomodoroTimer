# SwiftLint configuration for PomodoroTimer.
# CI runs `swiftlint lint` (non-strict): the build fails on rule *errors* only,
# while warnings surface as a quality signal. The monolith has been decomposed
# (SessionEngine extracted, views split), so thresholds are now tightened to the
# real shape of the codebase rather than the generous decomposition-era values.

included:
  - pomadoro2
  - pomadoro2Tests
  - pomadoro2UITests

excluded:
  - .build
  - pomadoro2/GoogleService-Info.plist

disabled_rules:
  # SwiftUI's `Button(action:) { label }` and `Picker(...) { ... } onChange`
  # patterns legitimately pass a closure argument plus a trailing closure; the
  # rule fires constantly on idiomatic SwiftUI, so it's noise here.
  - multiple_closures_with_trailing_closure

# Math / loop idioms and conventional short locals (incl. test-local d/m/v for
# defaults / manager / values) are fine.
identifier_name:
  min_length:
    warning: 2
  excluded:
    - x
    - y
    - i
    - id
    - db
    - vm
    - d
    - m
    - v

# `pomadoro2App` is the @main entry point; renaming the product type risks
# signing/Info.plist breakage. The two UITest classes are Xcode-template names.
type_name:
  excluded:
    - pomadoro2App
    - pomadoro2UITests
    - pomadoro2UITestsLaunchTests

# TimerManager (facade) and ContentView (root) are the two intentionally large
# files; they warn but don't fail the build. Everything else is held tighter.
file_length:
  warning: 700
  error: 1000

type_body_length:
  warning: 550
  error: 800

function_body_length:
  warning: 120
  error: 200

# SwiftUI modifier chains run long; 160 is a realistic ceiling.
line_length:
  warning: 160
  error: 200
